<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EDES Frontier Callback</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06090d;
      --card: #0b1016;
      --border: #1b2b3c;
      --muted: #7b8ea5;
      --text: #d6dce6;
      --accent: #f28a0c;
      --accent-dim: #261a0b;
      --green: #00d77a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(30deg, rgba(27, 43, 60, 0.22) 12%, transparent 12.5%, transparent 87%, rgba(27, 43, 60, 0.22) 87.5%, rgba(27, 43, 60, 0.22)),
        linear-gradient(150deg, rgba(27, 43, 60, 0.22) 12%, transparent 12.5%, transparent 87%, rgba(27, 43, 60, 0.22) 87.5%, rgba(27, 43, 60, 0.22)),
        linear-gradient(30deg, rgba(27, 43, 60, 0.16) 12%, transparent 12.5%, transparent 87%, rgba(27, 43, 60, 0.16) 87.5%, rgba(27, 43, 60, 0.16)),
        linear-gradient(150deg, rgba(27, 43, 60, 0.16) 12%, transparent 12.5%, transparent 87%, rgba(27, 43, 60, 0.16) 87.5%, rgba(27, 43, 60, 0.16)),
        var(--bg);
      background-position: 0 0, 0 0, 48px 56px, 48px 56px;
      background-size: 96px 112px;
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    main {
      width: min(620px, calc(100vw - 48px));
      padding: 34px;
      border: 1px solid var(--border);
      background: rgba(11, 16, 22, 0.94);
      text-align: center;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
    }

    .mark {
      width: 62px;
      height: 62px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(242, 138, 12, 0.35);
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 32px;
      line-height: 1;
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-size: 26px;
      letter-spacing: 0.34em;
      text-indent: 0.34em;
    }

    .subtitle {
      margin: 10px 0 28px;
      color: var(--muted);
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid rgba(0, 215, 122, 0.45);
      background: rgba(0, 215, 122, 0.08);
      color: var(--green);
      font-weight: 700;
    }

    .pulse {
      width: 8px;
      height: 8px;
      background: var(--green);
      animation: pulse 1.35s infinite;
    }

    p {
      margin: 24px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.35;
      }
      50% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">&#9651;</div>
    <h1>EDES</h1>
    <div class="subtitle">Frontier authorization callback</div>
    <div class="status">
      <span class="pulse"></span>
      Returning to EDES
    </div>
    <p>
      If EDES does not continue automatically, make sure the application is open
      and use <a id="return-link" href="#">return to EDES</a>.
    </p>
  </main>

  <script>
    const localCallback = "http://127.0.0.1:17737/frontier/callback/" + window.location.search;
    const link = document.getElementById("return-link");

    link.href = localCallback;
    window.setTimeout(() => {
      window.location.replace(localCallback);
    }, 650);
  </script>
</body>
</html>
